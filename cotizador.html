<title>Cotizador — Seguros Soledad Sáenz</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f4f4f6; color: #111; font-size: 14px; }

  /* Header */
  .header { background: #fff; border-bottom: 2px solid #00CCCC; padding: 12px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
  .header img { height: 40px; }
  .header h1 { font-size: 15px; font-weight: 600; color: #111; }
  .header span { font-size: 12px; color: #a955b3; }

  /* Steps */
  .steps { display: flex; background: #fff; border-bottom: 1px solid #e5e5e5; padding: 0 24px; }
  .step-item { flex: 1; text-align: center; padding: 10px 0; font-size: 12px; color: #999; border-bottom: 2px solid transparent; cursor: default; }
  .step-item.active { color: #185FA5; border-bottom-color: #185FA5; font-weight: 600; }
  .step-item.done { color: #0F6E56; border-bottom-color: #5DCAA5; }

  /* Layout */
  .container { max-width: 900px; margin: 24px auto; padding: 0 16px; }
  .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 20px 24px; margin-bottom: 16px; }
  .card-title { font-size: 11px; font-weight: 600; color: #a955b3; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 14px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 12px; color: #777; }
  .field input, .field select { border: 1px solid #ddd; border-radius: 8px; padding: 8px 10px; font-size: 13px; outline: none; transition: border-color .15s; }
  .field input:focus, .field select:focus { border-color: #a955b3; }

  /* Actions */
  .actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
  .btn { border: 1px solid #ddd; background: #fff; color: #444; border-radius: 8px; padding: 9px 20px; font-size: 13px; cursor: pointer; transition: background .15s; }
  .btn:hover { background: #f5f5f5; }
  .btn-primary { background: #a955b3; color: #fff; border-color: #a955b3; }
  .btn-primary:hover { background: #9244a0; }
  .btn-pdf { background: #111; color: #fff; border-color: #111; }
  .btn-pdf:hover { background: #333; }

  .hidden { display: none !important; }

  /* Aseguradoras */
  .aseg-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; margin-bottom: 14px; overflow: hidden; }
  .aseg-header { padding: 12px 16px; background: #fafafa; border-bottom: 1px solid #e5e5e5; display: flex; align-items: center; justify-content: space-between; }
  .aseg-nombre { font-weight: 600; font-size: 14px; }
  .aseg-badge { font-size: 11px; padding: 3px 10px; border-radius: 99px; font-weight: 600; }
  .plan-row { display: grid; grid-template-columns: 1fr auto auto auto; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid #f0f0f0; }
  .plan-row:last-child { border-bottom: none; }
  .plan-nombre { font-weight: 600; font-size: 13px; }
  .plan-desc { font-size: 11px; color: #888; margin-top: 2px; }
  .plan-ded { font-size: 10px; color: #aaa; margin-top: 3px; }
  .prima-anual { font-size: 16px; font-weight: 700; color: #a955b3; text-align: right; }
  .prima-mes { font-size: 11px; color: #666; text-align: right; }
  .btn-select { background: #edf4ff; color: #185FA5; border: none; border-radius: 8px; padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .btn-select:hover { background: #dbeafe; }
  .cob-toggle { font-size: 11px; color: #a955b3; cursor: pointer; padding: 6px 16px; display: block; background: #fdf5fe; }
  .cob-detail { padding: 8px 16px 12px; display: none; }
  .cob-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .cob-table td { padding: 4px 0; border-bottom: 1px solid #f0f0f0; color: #555; }
  .cob-table td:last-child { text-align: right; font-weight: 600; color: #111; }
  .cob-table tr:last-child td { border-bottom: none; }
  .highlighted { border: 2px solid #a955b3 !important; }

  /* Resumen */
  .resumen-row { display: flex; justify-content: space-between; font-size: 13px; padding: 6px 0; border-bottom: 1px solid #f0f0f0; }
  .resumen-row:last-child { border-bottom: none; }
  .resumen-row span:first-child { color: #888; }
  .resumen-total { font-size: 20px; font-weight: 700; color: #a955b3; }
  .resumen-mes { font-size: 13px; color: #555; font-weight: 600; }

  /* Badges */
  .badge-economico    { background: #E8F5E9; color: #2E7D32; }
  .badge-cobertura    { background: #F3E5F5; color: #6A1B9A; }
  .badge-deducible    { background: #E3F2FD; color: #1565C0; }
  .badge-flexibilidad { background: #FFF8E1; color: #E65100; }
  .badge-tecnologia   { background: #E0F7FA; color: #00695C; }

  /* Vehículo resumen pill */
  .vehiculo-pill { display: inline-flex; gap: 16px; background: #f9f0fb; border: 1px solid #e8c9ef; border-radius: 8px; padding: 8px 16px; margin-bottom: 16px; font-size: 13px; flex-wrap: wrap; }
  .vehiculo-pill strong { color: #a955b3; }

  /* Loading overlay */
  .loading { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center; z-index: 999; }
  .loading-box { background: #fff; border-radius: 12px; padding: 32px 40px; text-align: center; }
  .loading-box p { margin-top: 12px; font-size: 14px; color: #555; }
  .spinner { width: 36px; height: 36px; border: 3px solid #f0e0f7; border-top-color: #a955b3; border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>

<div class="header">
  <img src="/logo.png" alt="Seguros Soledad Sáenz">
  <div>
    <h1>Cotizador de seguros vehiculares</h1>
    <span>Herramienta interna · Seguros Soledad Sáenz</span>
  </div>
</div>

<div class="steps">
  <div class="step-item active" id="s1">1. Cliente y vehículo</div>
  <div class="step-item" id="s2">2. Comparar opciones</div>
  <div class="step-item" id="s3">3. Resumen y PDF</div>
</div>

<div class="container">

  <!-- ── PASO 1 ── -->
  <div id="paso1">
    <div class="card">
      <div class="card-title">Datos del cliente</div>
      <div class="grid2">
        <div class="field"><label>Nombre completo</label><input id="nombre" placeholder="Ej. Veronica Tobar Taylor"></div>
        <div class="field"><label>Cédula / Pasaporte</label><input id="cedula" placeholder="1713919841"></div>
        <div class="field"><label>Teléfono</label><input id="telefono" placeholder="+593 98..."></div>
        <div class="field"><label>Correo electrónico</label><input id="correo" placeholder="cliente@email.com"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Datos del vehículo</div>
      <div class="grid3">
        <div class="field"><label>Placa</label><input id="placa" placeholder="PFB-7622"></div>
        <div class="field"><label>Marca</label><input id="marca" placeholder="NISSAN"></div>
        <div class="field"><label>Modelo</label><input id="modelo" placeholder="ROGUE"></div>
        <div class="field"><label>Año</label><input id="anio" type="number" placeholder="2020" min="2000" max="2030"></div>
        <div class="field"><label>Tipo</label>
          <select id="tipo"><option>JEEP / SUV</option><option>Sedán</option><option>Camioneta</option><option>Hatchback</option></select>
        </div>
        <div class="field"><label>Uso</label>

        </div>
      </div>
      <div class="grid2" style="margin-top:12px">
        <div class="field"><label>Valor comercial (USD)</label><input id="valor" type="number" placeholder="24000"></div>
        <div class="field"><label>Valor extras (USD)</label><input id="extras" type="number" placeholder="0" value="0"></div>
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-primary" onclick="irPaso2()">Ver opciones →</button>
    </div>
  </div>

  <!-- ── PASO 2 ── -->
  <div id="paso2" class="hidden">
    <div id="vehiculo-pill-wrap"></div>
    <div id="aseguradoras-wrap"></div>
    <div class="actions">
      <button class="btn" onclick="irPaso(1)">← Editar datos</button>
    </div>
  </div>

  <!-- ── PASO 3 ── -->
  <div id="paso3" class="hidden">
    <div class="card">
      <div class="card-title">Resumen de cotización</div>
      <div id="resumen-final"></div>
    </div>
    <div class="actions">
      <button class="btn" onclick="irPaso(2)">← Cambiar selección</button>
      <button class="btn btn-pdf" onclick="generarPDF()">Descargar PDF</button>
    </div>
  </div>

</div>

<!-- Loading -->
<div class="loading hidden" id="loading">
  <div class="loading-box">
    <div class="spinner"></div>
    <p>Generando propuesta PDF...</p>
  </div>
</div>

function irPaso(n) {
  ['paso1','paso2','paso3'].forEach((id,i) => document.getElementById(id).classList.toggle('hidden', i !== n-1));
  ['s1','s2','s3'].forEach((id,i) => {
    const el = document.getElementById(id);
    el.className = 'step-item';
    if (i+1 < n) el.classList.add('done');
    else if (i+1 === n) el.classList.add('active');
  });
}

function fmtPrima(p) { return '$' + (p*(1+IVA)).toLocaleString('es-EC',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtMes(p)   { return '$' + (p*(1+IVA)/12).toLocaleString('es-EC',{minimumFractionDigits:2,maximumFractionDigits:2}); }

      <span><strong>Cliente:</strong> ${datosCliente.nombre}</span>
      <span><strong>Vehículo:</strong> ${datosCliente.marca} ${datosCliente.modelo} ${datosCliente.anio}</span>
      <span><strong>Placa:</strong> ${datosCliente.placa}</span>
      <span><strong>Valor:</strong> $${datosCliente.valor.toLocaleString()}</span>
    </div>`;

  const wrap = document.getElementById('aseguradoras-wrap');
  wrap.innerHTML = '';
  ASEGURADORAS.forEach(aseg => {
    const planesHTML = aseg.planes.map(p => {
      const cobHTML = p.coberturas.map(c=>`<tr><td>${c[0]}</td><td>${c[1]}</td></tr>`).join('');
      return `
        <div class="plan-row" id="planrow-${p.id}">
          <div>
            <div class="plan-nombre">${p.nombre}</div>
            <div class="plan-desc">${p.desc}</div>
            <div class="plan-ded">Ded.: ${p.deducible_corto}</div>
          </div>
          <div style="text-align:right">
            <div class="prima-anual">${fmtPrima(p.prima_total)}</div>
            <div class="prima-mes">${fmtMes(p.prima_total)}/mes × 12</div>
          </div>
          <span class="aseg-badge ${p.ventaja_tipo ? 'badge-'+p.ventaja_tipo : ''}" style="font-size:11px">${p.ventaja_texto}</span>
          <button class="btn-select" onclick="seleccionar('${aseg.id}','${aseg.nombre}','${p.id}','${p.nombre}',${p.prima_total},'${p.ventaja_texto}','${p.ventaja_tipo}')">Seleccionar</button>
        </div>
        <span class="cob-toggle" onclick="toggleCob('cob-${p.id}',this)">+ ver coberturas</span>
        <div class="cob-detail" id="cob-${p.id}">
          <table class="cob-table"><tbody>${cobHTML}</tbody></table>
          ${p.asistencias ? `<div style="font-size:11px;color:#888;margin-top:8px"><strong style="color:#555">Asistencias:</strong> ${p.asistencias}</div>` : ''}
        </div>`;
    }).join('');

    wrap.innerHTML += `
      <div class="aseg-card" id="card-${aseg.id}">
        <div class="aseg-header">
          <span class="aseg-nombre">${aseg.nombre}</span>
          <span class="aseg-badge ${aseg.badgeClass}">${aseg.badge}</span>
        </div>
        ${planesHTML}
      </div>`;
  });
  irPaso(2);
}

function toggleCob(id, el) {
  const d = document.getElementById(id);
  const vis = d.style.display === 'block';
  d.style.display = vis ? 'none' : 'block';
  el.textContent = vis ? '+ ver coberturas' : '– ocultar coberturas';
}

function seleccionar(asegId, asegNombre, planId, planNombre, primaTotal, ventajaTexto, ventajaTipo) {
  const plan = ASEGURADORAS.flatMap(a=>a.planes).find(p=>p.id===planId);
  seleccion = { asegId, asegNombre, planId, planNombre, primaTotal, ventajaTexto, ventajaTipo, plan };
  document.querySelectorAll('.aseg-card').forEach(c=>c.classList.remove('highlighted'));
  document.getElementById('card-'+asegId).classList.add('highlighted');

  const primaIva = primaTotal*(1+IVA);
  const mes = primaIva/12;
  document.getElementById('resumen-final').innerHTML = `
    <div class="resumen-row"><span>Cliente</span><span>${datosCliente.nombre}</span></div>
    <div class="resumen-row"><span>Cédula</span><span>${datosCliente.cedula}</span></div>
    <div class="resumen-row"><span>Vehículo</span><span>${datosCliente.marca} ${datosCliente.modelo} ${datosCliente.anio}</span></div>
    <div class="resumen-row"><span>Placa</span><span>${datosCliente.placa}</span></div>
    <div class="resumen-row"><span>Valor asegurado</span><span>$${datosCliente.valor.toLocaleString()}</span></div>
    <div class="resumen-row"><span>Aseguradora</span><span>${asegNombre}</span></div>
    <div class="resumen-row"><span>Plan</span><span>${planNombre}</span></div>
    <div class="resumen-row"><span>Punto fuerte</span><span>${ventajaTexto}</span></div>
    <div class="resumen-row" style="margin-top:8px;padding-top:12px;border-top:2px solid #f0e0f7">
      <span style="font-weight:600">Prima total (con IVA)</span>
      <span class="resumen-total">$${primaIva.toLocaleString('es-EC',{minimumFractionDigits:2})}</span>
    </div>
    <div class="resumen-row">
      <span>Cuota mensual × 12 sin intereses</span>
      <span class="resumen-mes">$${mes.toLocaleString('es-EC',{minimumFractionDigits:2})}/mes</span>
    </div>`;
  irPaso(3);
}

async function generarPDF() {
  if (!seleccion) return;
  document.getElementById('loading').classList.remove('hidden');
  const plan = seleccion.plan;
  const payload = {
    ...datosCliente,
    planes: [{
      aseguradora: seleccion.asegNombre,
      plan: seleccion.planNombre,
      ventaja_texto: seleccion.ventajaTexto,
      ventaja_tipo: seleccion.ventajaTipo,
      recomendado: true,
      rc: plan.rc, parcial: plan.parcial, total: plan.total,
      auto_sust: plan.auto_sust,
      prima_total: seleccion.primaTotal,
      deducible_corto: plan.deducible_corto,
      deducible: plan.deducible,
      asistencias: plan.asistencias,
      coberturas: plan.coberturas,
    }]
  };
  try {
    const resp = await fetch('/generar-pdf', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `propuesta_${datosCliente.placa.replace(/[^a-zA-Z0-9]/g,'')}.pdf`;
    a.click();
    URL.revokeObjectURL(url);
  } catch(e) {
    alert('Error al generar el PDF. Por favor intenta de nuevo.');
  } finally {
    document.getElementById('loading').classList.add('hidden');
  }
}
</script>
